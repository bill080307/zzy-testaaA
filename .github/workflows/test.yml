name: Test Action

on:
  pull_request:

permissions:
  pull-requests: write

jobs:
  build-1:
    runs-on: ubuntu-latest
    steps:
      - name: Display PR body
        id: parse_pr
        run: |
          echo "PR Body: ${{ github.event.pull_request.body }} 2"
          DEPLOY_ENV=$(echo "${{ github.event.pull_request.body }}" | grep "deploy_env:" | awk '{print $2}')
          echo "Deploy Env: $DEPLOY_ENV"
          echo "deploy_env=$DEPLOY_ENV" >> $GITHUB_OUTPUT
      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          DEPLOY_ENV: ${{ steps.parse_pr.outputs.deploy_env }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Deploy Environment: ${process.env.DEPLOY_ENV}`
            })

