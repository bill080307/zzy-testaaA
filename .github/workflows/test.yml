name: Test Action

on:
  workflow_dispatch:
    inputs:
      build1:
        description: 'Build 1'
        required: false
        type: boolean
        default: false
      build2:
        description: 'Build 2'
        required: false
        type: boolean
        default: false
      build3:
        description: 'Build 3'
        required: false
        type: boolean
        default: false

jobs:
  build-1:
    runs-on: ubuntu-latest
    if: github.event.inputs.build1 == 'true'
    steps:
      - name: Display selected actions
        run: |
          echo "Build 1"
  build-2:
    runs-on: ubuntu-latest
    if: github.event.inputs.build2 == 'true'
    steps:
      - name: Display selected actions
        run: |
          echo "Build 2"
  build-3:
    runs-on: ubuntu-latest
    if: github.event.inputs.build3 == 'true'
    steps:
      - name: Display selected actions
        run: |
          echo "Build 3"
  test11:
    runs-on: ubuntu-latest
    needs: [build-1, build-2, build-3]
    steps:
      - name: tesr selected actions
        run: |
          echo "${{ (github.event.inputs.build1 == 'true' || github.event.inputs.build2 == 'true' || github.event.inputs.build3 == 'true') }}"
          echo "${{ (github.event.inputs.build1 == 'false' || needs.build-1.result == 'success') }}"
          echo "${{ (github.event.inputs.build2 == 'false' || needs.build-2.result == 'success') }}"
          echo "${{ (github.event.inputs.build3 == 'false' || needs.build-3.result == 'success') }}"
  finally:
    runs-on: ubuntu-latest
    needs: [build-1, build-2, build-3]
    if: |
      (github.event.inputs.build1 == 'true' || github.event.inputs.build2 == 'true' || github.event.inputs.build3 == 'true') &&
      (github.event.inputs.build1 == 'false' || needs.build-1.result == 'success') &&
      (github.event.inputs.build2 == 'false' || needs.build-2.result == 'success') &&
      (github.event.inputs.build3 == 'false' || needs.build-3.result == 'success')
    steps:
      - name: Display selected actions
        run: |
          echo "Finally"
